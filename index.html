<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>XV Sophia Gabrielle</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      width: 100%;
      height: 100%;
    }

    body {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      font-family: Georgia, serif;
      background: black;
    }

    .video-fundo {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -5;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.42);
      z-index: -4;
    }

    .brilho {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle,
          rgba(255, 215, 120, 0.32),
          transparent 45%);
      animation: brilho 3s infinite alternate;
      z-index: -3;
      pointer-events: none;
    }

    @keyframes brilho {
      from {
        opacity: 0.3;
        transform: scale(1);
      }

      to {
        opacity: 0.8;
        transform: scale(1.1);
      }
    }

    .container {
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      padding-bottom: 35px;
      padding-left: 16px;
      padding-right: 16px;
    }

    .caixa {
      width: 82%;
      max-width: 360px;
      background: rgba(25, 5, 5, 0.42);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 215, 120, 0.5);
      border-radius: 26px;
      padding: 24px 20px 26px;
      text-align: center;
      color: white;
      box-shadow: 0 0 28px rgba(255, 190, 80, 0.35);
      animation: subir 1.5s ease;
    }

    @keyframes subir {
      from {
        opacity: 0;
        transform: translateY(80px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .nome {
      font-size: 19px;
      color: #ffd98a;
      letter-spacing: 4px;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    h1 {
      font-size: 50px;
      color: #fff4cf;
      text-shadow: 0 0 20px rgba(255, 210, 100, 0.9);
      margin-bottom: 8px;
      line-height: 1;
    }

    .linha {
      width: 80px;
      height: 2px;
      margin: 14px auto 18px;
      background: linear-gradient(to right,
          transparent,
          #ffd36b,
          transparent);
    }

    .texto {
      font-size: 15px;
      color: #f6f1e7;
      line-height: 1.45;
      margin-bottom: 22px;
    }

    .botao {
      display: inline-block;
      padding: 13px 32px;
      border-radius: 40px;
      text-decoration: none;
      background: linear-gradient(135deg,
          #fff0b8,
          #d89b2d,
          #fff0b8);
      color: #4b1208;
      font-weight: bold;
      font-size: 15px;
      transition: 0.4s;
      box-shadow: 0 0 18px rgba(255, 210, 100, 0.75);
    }

    .botao:hover {
      transform: scale(1.08);
      box-shadow: 0 0 40px rgba(255, 220, 120, 1);
    }

    .particulas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -2;
    }

    .particulas span {
      position: fixed;
      bottom: -30px;
      width: 7px;
      height: 7px;
      background: #ffd36b;
      border-radius: 50%;
      box-shadow: 0 0 15px #ffd36b;
      animation: subirParticulas 7s linear infinite;
    }

    .particulas span:nth-child(1) {
      left: 10%;
      animation-delay: 0s;
    }

    .particulas span:nth-child(2) {
      left: 30%;
      animation-delay: 2s;
    }

    .particulas span:nth-child(3) {
      left: 50%;
      animation-delay: 1s;
    }

    .particulas span:nth-child(4) {
      left: 70%;
      animation-delay: 4s;
    }

    .particulas span:nth-child(5) {
      left: 90%;
      animation-delay: 2.5s;
    }

    @keyframes subirParticulas {
      from {
        transform: translateY(0) scale(0.5);
        opacity: 0;
      }

      30% {
        opacity: 1;
      }

      to {
        transform:
          translateY(-120vh) translateX(40px) scale(1.4);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <video class="video-fundo" autoplay muted loop playsinline>
    <source src="rosa.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <div class="brilho"></div>

  <div class="particulas">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>

  <div class="container">

    <div class="caixa">

      <div class="nome">
        Sophia Gabrielle
      </div>

      <h1>
        XV
      </h1>

      <div class="linha"></div>

      <div class="texto">
        Uma noite mágica e encantadora espera por você.
      </div>

      <a href="convite.html" class="botao">
        Continuar
      </a>

    </div>

  </div>

</body>

</html>
