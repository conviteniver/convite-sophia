<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Confirmar Presença</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
font-family:Georgia,serif;
overflow:hidden;
color:white;
}

video{
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-3;
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.55);
z-index:-2;
}

.caixa{

position:absolute;

top:50%;
left:50%;

transform:
translate(-50%,-50%);

width:90%;
max-width:420px;

padding:35px;

border-radius:30px;

background:
rgba(25,5,5,.45);

backdrop-filter:
blur(12px);

border:1px solid
rgba(255,215,120,.5);

box-shadow:
0 0 35px rgba(255,190,80,.35);

text-align:center;

}

h1{

font-size:32px;

color:#ffd46f;

margin-bottom:15px;

}

.linha{

width:120px;
height:2px;

margin:auto;
margin-bottom:20px;

background:
linear-gradient(
to right,
transparent,
gold,
transparent
);

}

p{

font-size:17px;

line-height:1.7;

color:#f3e7c7;

margin-bottom:25px;

}

.botao{

display:inline-block;

padding:15px 30px;

border-radius:40px;

text-decoration:none;

background:
linear-gradient(
135deg,
#fff0b8,
#d89b2d,
#fff0b8
);

color:#4b1208;

font-weight:bold;

box-shadow:
0 0 25px rgba(255,215,100,.7);

margin-bottom:15px;

}

.voltar{

display:block;

margin-top:15px;

color:#ffd98a;

text-decoration:none;

}

</style>

</head>

<body>

<video autoplay muted loop playsinline>

<source src="rosa.mp4" type="video/mp4">

</video>

<div class="overlay"></div>

<div class="caixa">

<h1>
💖 Confirmar Presença
</h1>

<div class="linha"></div>

<p>

Sua presença tornará essa noite ainda mais especial e encantadora ✨

</p>

<a
href="https://portal.derlo.com.br/landings/convidados_autoinsert/add"
target="_blank"
class="botao">

Confirmar Agora

</a>

<a
href="convite.html"
class="voltar">

Voltar

</a>

</div>

</body>

</html>
