<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Local • Sophia XV</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

font-family:Georgia,serif;

overflow:hidden;

background:black;

color:white;

}

.video{

position:fixed;

inset:0;

width:100%;
height:100%;

object-fit:cover;

filter:brightness(.35);

z-index:-5;

}

.overlay{

position:fixed;

inset:0;

background:
radial-gradient(
circle,
rgba(255,215,120,.12),
rgba(0,0,0,.75)
);

z-index:-4;

}

.caixa{

width:90%;

max-width:420px;

padding:35px;

text-align:center;

border-radius:35px;

background:
rgba(35,10,10,.35);

backdrop-filter:
blur(12px);

border:
1px solid
rgba(
255,
215,
120,
.45
);

box-shadow:
0 0 35px
rgba(
255,
190,
80,
.35
);

animation:
subir
1.5s;

}

@keyframes subir{

from{

opacity:0;

transform:
translateY(80px);

}

to{

opacity:1;

transform:
translateY(0);

}

}

.icone{

font-size:45px;

margin-bottom:10px;

}

.titulo{

font-size:32px;

color:#ffd36b;

margin-bottom:10px;

}

.linha{

width:90px;

height:2px;

margin:
15px auto
25px;

background:
linear-gradient(
to right,
transparent,
gold,
transparent
);

}

.local{

font-size:28px;

color:#fff4cf;

margin-bottom:20px;

}

.endereco{

font-size:17px;

line-height:1.8;

color:#f3e8cf;

}

.botao{

display:inline-block;

margin-top:28px;

padding:
14px
32px;

border-radius:40px;

background:
linear-gradient(
135deg,
#fff0b8,
#d89b2d,
#fff0b8
);

text-decoration:none;

font-weight:bold;

color:#4b1208;

box-shadow:
0 0 25px
rgba(
255,
215,
100,
.8
);

transition:.5s;

}

.botao:hover{

transform:
scale(1.06);

}

.voltar{

display:block;

margin-top:20px;

text-decoration:none;

color:#ffd98a;

}

</style>

</head>

<body>

<video
class="video"
autoplay
muted
loop
playsinline>

<source
src="rosa.mp4"
type="video/mp4">

</video>

<div class="overlay"></div>

<div class="caixa">

<div class="icone">
📍
</div>

<div class="titulo">

Local do Evento

</div>

<div class="linha"></div>

<div class="local">

Ballroom Iris

</div>

<div class="endereco">

<br><br>

18:45 horas

<br><br>

Rua Barão de Capanema, 358

Bangu • Rio de Janeiro

</div>

class="botao"
href="https://www.google.com/maps/place/Ballroom+%C3%8Dris+-+Casa+de+Festas+em+Bangu/@-22.8837909,-43.4700775,17z/data=!3m1!4b1!4m6!3m5!1s0x9bdfe9e2c89467:0x28a6a2bde285af76!8m2!3d-22.8837909!4d-43.4700775!16s%2Fg%2F1ptx5rysc!18m1!1e1?entry=ttu&g_ep=EgoyMDI2MDUxMy4wIKXMDSoASAFQAw%3D%3D">

class="voltar">

</div>

</body>
</html>
